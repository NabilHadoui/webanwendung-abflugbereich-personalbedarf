
services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html/
    depends_on:
      - db

  db:
    image: mariadb:10.7
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: airport_database
      MYSQL_USER: airport_user
      MYSQL_PASSWORD: rL[IfUkr1aXa[fyP
    volumes:
      - ./data/mysql/:/var/lib/mysql
    networks:
      - default

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    links:
      - db:db
    ports:
      - "8000:80"
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_USER: airport_user
      MYSQL_PASSWORD: rL[IfUkr1aXa[fyP
    depends_on:
      - db
    networks:
      - default
